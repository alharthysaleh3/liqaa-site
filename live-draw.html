<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لقاء Liqaa — السحب المباشر</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
  :root{
    --maroon:#7A1E26; --maroon-dark:#4A1219; --maroon-deep:#330C0F;
    --gold:#D4AF5A; --gold-light:#F2E6C9; --gold-bright:#F0CE7A;
    --text-soft:#D9C6A8;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    font-family:"Segoe UI", Tahoma, Arial, sans-serif; direction:rtl;
    background:radial-gradient(ellipse at center, var(--maroon-dark) 0%, var(--maroon-deep) 70%, #1a0608 100%);
    color:#fff;
  }
  .stage{
    height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; padding:24px;
  }

  .topBrand{position:absolute; top:28px; right:36px; display:flex; align-items:center; gap:12px; opacity:0.9;}
  .topBrand .logo{
    width:38px; height:38px; border-radius:10px; background:var(--gold);
    display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--maroon-deep); font-size:16px;
  }
  .topBrand .label{font-size:14px; color:var(--gold-light); font-weight:600;}

  .statBadge{
    position:absolute; top:28px; left:36px; background:rgba(255,255,255,0.08); border:1px solid rgba(212,175,90,0.4);
    border-radius:24px; padding:8px 20px; font-size:13px; color:var(--gold-light); font-weight:700;
  }

  #idleView{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .titleMain{font-size:48px; font-weight:800; color:#fff; margin:0; letter-spacing:1px;}
  .titleMain .accent{color:var(--gold-bright);}
  .titleSub{font-size:16px; color:var(--text-soft); margin:0 0 50px; font-weight:500;}

  .drawCircle{
    width:280px; height:280px; border-radius:50%;
    border:3px solid var(--gold); background:rgba(255,255,255,0.04);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    box-shadow:0 0 60px rgba(212,175,90,0.25), inset 0 0 40px rgba(212,175,90,0.08);
    margin-bottom:46px; position:relative;
  }
  .drawCircle .count{font-size:64px; font-weight:800; color:var(--gold-bright);}
  .drawCircle .countLabel{font-size:14px; color:var(--text-soft); margin-top:4px;}

  .ringPulse{
    position:absolute; inset:-14px; border-radius:50%; border:1px solid rgba(212,175,90,0.3);
    animation:ringPulse 2.4s ease-in-out infinite;
  }
  @keyframes ringPulse{ 0%{transform:scale(1); opacity:0.6;} 100%{transform:scale(1.18); opacity:0;} }

  .filterRow{display:flex; gap:12px; margin-bottom:30px; align-items:center;}
  .filterRow input{
    font-size:14px; padding:11px 16px; border-radius:30px; border:1px solid rgba(212,175,90,0.4);
    background:rgba(255,255,255,0.06); color:#fff; width:260px; text-align:center;
  }
  .filterRow input::placeholder{color:var(--text-soft);}
  .filterRow input:focus{outline:none; border-color:var(--gold-bright);}

  .drawBtn{
    font-size:22px; font-weight:800; padding:18px 64px; border-radius:50px; border:none;
    background:linear-gradient(135deg, var(--gold-bright), var(--gold)); color:var(--maroon-deep);
    cursor:pointer; letter-spacing:1px; box-shadow:0 8px 24px rgba(212,175,90,0.35);
    transition:transform 0.15s;
  }
  .drawBtn:hover{transform:translateY(-2px) scale(1.02);}
  .drawBtn:disabled{opacity:0.5; cursor:not-allowed;}

  .checkRow{display:flex; align-items:center; gap:8px; margin-top:20px; font-size:13px; color:var(--text-soft);}
  .checkRow input{width:auto;}

  /* Spinning view */
  #spinView{display:none; flex-direction:column; align-items:center;}
  .spinLabel{font-size:16px; color:var(--gold-light); margin-bottom:24px; letter-spacing:2px; font-weight:700;}
  .nameSlot{
    font-size:56px; font-weight:800; color:#fff; height:90px; display:flex; align-items:center; justify-content:center;
    min-width:600px;
  }
  .branchSlot{font-size:18px; color:var(--gold-light); margin-top:6px; font-weight:600;}

  /* Winner reveal view */
  #winnerView{display:none; flex-direction:column; align-items:center; text-align:center;}
  .winnerCrown{font-size:42px; margin-bottom:6px;}
  .winnerLabel{font-size:16px; color:var(--gold-light); letter-spacing:3px; font-weight:700; margin:0 0 18px;}
  .winnerName{
    font-size:72px; font-weight:800; margin:0; color:#fff;
    text-shadow:0 0 40px rgba(212,175,90,0.6);
    animation:winnerPop 0.6s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes winnerPop{ 0%{transform:scale(0.3); opacity:0;} 60%{transform:scale(1.1);} 100%{transform:scale(1); opacity:1;} }
  .winnerBranch{font-size:24px; color:var(--gold-bright); margin-top:10px; font-weight:700;}
  .winnerActions{display:flex; gap:14px; margin-top:48px;}
  .ghostBtn{
    font-size:15px; font-weight:700; padding:13px 32px; border-radius:40px;
    border:1px solid rgba(212,175,90,0.5); background:transparent; color:var(--gold-light); cursor:pointer;
  }
  .ghostBtn:hover{background:rgba(212,175,90,0.1);}

  /* confetti */
  .confettiPiece{
    position:absolute; top:-20px; width:10px; height:16px; opacity:0.9; pointer-events:none;
    animation:fall linear forwards;
  }
  @keyframes fall{ to{ transform:translateY(110vh) rotate(720deg); opacity:0; } }

  .emptyMsg{font-size:18px; color:var(--text-soft); margin-top:20px;}
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="topBrand">
    <div class="logo">L</div>
    <div class="label">لقاء Liqaa</div>
  </div>
  <div class="statBadge" id="poolBadge">جاري التحميل...</div>

  <!-- شاشة الاستعداد -->
  <div id="idleView">
    <p class="titleMain">السحب <span class="accent">العشوائي</span></p>
    <p class="titleSub">اضغط الزر لبدء سحب الفائز</p>

    <div class="drawCircle">
      <div class="ringPulse"></div>
      <div class="count" id="poolCount">0</div>
      <div class="countLabel">مشارك في السحب الآن</div>
    </div>

    <div class="filterRow">
      <input type="text" id="branchFilter" placeholder="سحب من فرع محدد (اختياري)...">
    </div>

    <button class="drawBtn" id="drawBtn">ابدأ السحب</button>

    <label class="checkRow">
      <input type="checkbox" id="excludeWinners" checked>
      استبعاد الفائزين السابقين (<span id="winnerCountLabel">0</span> فائز حتى الآن)
    </label>

    <p class="emptyMsg" id="emptyMsg" style="display:none;">لا يوجد مشاركون متاحون للسحب بعد</p>
  </div>

  <!-- شاشة التدوير -->
  <div id="spinView">
    <p class="spinLabel">جاري السحب...</p>
    <div class="nameSlot" id="nameSlot">—</div>
    <div class="branchSlot" id="branchSlot"></div>
  </div>

  <!-- شاشة الفائز -->
  <div id="winnerView">
    <div class="winnerCrown">★</div>
    <p class="winnerLabel">الفائز المحظوظ</p>
    <p class="winnerName" id="winnerName">—</p>
    <p class="winnerBranch" id="winnerBranch"></p>
    <div class="winnerActions">
      <button class="drawBtn" id="drawAgainBtn">سحب آخر</button>
      <button class="ghostBtn" id="backBtn">رجوع</button>
    </div>
  </div>
</div>

<script>
const db = firebase.database();
let present = {};
let winners = [];

db.ref('liqaa_checkins').on('value', function(snapshot){
  present = snapshot.val() || {};
  updatePoolUI();
});
db.ref('liqaa_winners').on('value', function(snapshot){
  const data = snapshot.val() || {};
  winners = Object.values(data).map(w => w.checkinId);
  document.getElementById('winnerCountLabel').textContent = winners.length;
  updatePoolUI();
});

function getPool(){
  const branchFilter = document.getElementById('branchFilter').value.trim().toLowerCase();
  let pool = Object.keys(present);
  if(branchFilter) pool = pool.filter(id => present[id].branch.toLowerCase().includes(branchFilter));
  if(document.getElementById('excludeWinners').checked) pool = pool.filter(id => !winners.includes(id));
  return pool;
}

function updatePoolUI(){
  const pool = getPool();
  document.getElementById('poolCount').textContent = pool.length;
  document.getElementById('poolBadge').textContent = Object.keys(present).length + ' مسجّل إجمالي';
  document.getElementById('drawBtn').disabled = pool.length === 0;
  document.getElementById('emptyMsg').style.display = pool.length === 0 ? 'block' : 'none';
}
document.getElementById('branchFilter').addEventListener('input', updatePoolUI);
document.getElementById('excludeWinners').addEventListener('change', updatePoolUI);

/* ---------- أصوات مولّدة برمجياً (Web Audio API) — بدون ملفات خارجية ---------- */
const actx = new (window.AudioContext || window.webkitAudioContext)();

function tick(freq){
  const o = actx.createOscillator(); const g = actx.createGain();
  o.type = 'square'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.06, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.08);
  o.connect(g); g.connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.08);
}

function fanfare(){
  const notes = [523.25, 659.25, 783.99, 1046.50]; // C E G C (مقام احتفالي)
  notes.forEach((freq, i)=>{
    setTimeout(()=>{
      const o = actx.createOscillator(); const g = actx.createGain();
      o.type = 'triangle'; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.18, actx.currentTime + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.9);
      o.connect(g); g.connect(actx.destination);
      o.start(); o.stop(actx.currentTime + 0.9);
    }, i * 130);
  });
}

/* ---------- confetti ---------- */
function launchConfetti(){
  const colors = ['#D4AF5A','#F0CE7A','#FFFFFF','#9C3A41'];
  for(let i=0;i<60;i++){
    const piece = document.createElement('div');
    piece.className = 'confettiPiece';
    piece.style.left = Math.random()*100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDuration = (2.5 + Math.random()*2) + 's';
    piece.style.animationDelay = (Math.random()*0.6) + 's';
    document.getElementById('stage').appendChild(piece);
    setTimeout(()=> piece.remove(), 5000);
  }
}

/* ---------- منطق السحب ---------- */
function showView(id){
  ['idleView','spinView','winnerView'].forEach(v=>{
    document.getElementById(v).style.display = (v===id) ? 'flex' : 'none';
  });
}

document.getElementById('drawBtn').addEventListener('click', startDraw);
document.getElementById('drawAgainBtn').addEventListener('click', startDraw);
document.getElementById('backBtn').addEventListener('click', ()=> showView('idleView'));

function startDraw(){
  const pool = getPool();
  if(pool.length === 0){ return; }

  showView('spinView');
  const nameSlot = document.getElementById('nameSlot');
  const branchSlot = document.getElementById('branchSlot');

  let elapsed = 0;
  let interval = 60;
  const totalDuration = 2800;

  function spinStep(){
    const randId = pool[Math.floor(Math.random()*pool.length)];
    nameSlot.textContent = present[randId].name;
    branchSlot.textContent = present[randId].branch;
    tick(220 + Math.random()*120);

    elapsed += interval;
    interval += 14; // يتباطأ تدريجياً
    if(elapsed < totalDuration){
      setTimeout(spinStep, interval);
    } else {
      finishDraw(pool);
    }
  }
  spinStep();
}

function finishDraw(pool){
  const winnerId = pool[Math.floor(Math.random()*pool.length)];
  const w = present[winnerId];

  db.ref('liqaa_winners').push({
    checkinId: winnerId,
    name: w.name,
    branch: w.branch,
    timestamp: Date.now()
  });

  document.getElementById('winnerName').textContent = w.name;
  document.getElementById('winnerBranch').textContent = w.branch;
  showView('winnerView');
  fanfare();
  launchConfetti();
}
</script>

</body>
</html>
